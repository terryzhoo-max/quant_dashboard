version: "3.8"

services:
  # ── Redis 持久化缓存 ──
  redis:
    image: redis:7-alpine
    container_name: alphacore_redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── AlphaCore 量化终端 ──
  quant_dashboard:
    build: .
    container_name: quant_dashboard_app
    dns:
      - 8.8.8.8
      - 223.5.5.5
    # Batch 6: 端口不再直接暴露到公网, 仅通过 Nginx 访问
    # 本地开发保留 8000 映射, 生产由 Nginx 容器代理
    expose:
      - "8000"
    ports:
      - "8000:8000"       # 开发环境直连 (生产部署时注释此行)
    volumes:
      # 数据持久化: Parquet 缓存永不丢失
      - ./data_lake:/app/data_lake
    env_file:
      - .env
    environment:
      # Redis 连接 (容器间通过 service name 互通)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # 生产日志格式
      - AC_LOG_FORMAT=console
      - AC_LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Batch 6: Nginx 反向代理 (HTTPS + 安全头) ──
  # 部署到生产环境时取消注释以下内容:
  #
  # nginx:
  #   image: nginx:1.25-alpine
  #   container_name: alphacore_nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #     - certbot_www:/var/www/certbot:ro
  #   depends_on:
  #     - quant_dashboard
  #   restart: unless-stopped
  #
  # certbot:
  #   image: certbot/certbot
  #   container_name: alphacore_certbot
  #   volumes:
  #     - ./nginx/ssl:/etc/letsencrypt
  #     - certbot_www:/var/www/certbot
  #   entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  redis_data:
    driver: local
  # certbot_www:      # 生产环境取消注释
  #   driver: local

# ──────────────────────────────────────────────
# AlphaCore CI Pipeline
# 触发: push/PR → main 分支
# 内容: 语法检查 + 31 个单元测试
# ──────────────────────────────────────────────
name: AlphaCore CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -q
          pip install pytest "httpx>=0.23,<0.28" -q

      - name: AST Syntax Check
        run: |
          python -c "
          import ast, pathlib, sys
          errors = []
          for f in pathlib.Path('.').glob('**/*.py'):
              if '.venv' in str(f) or 'node_modules' in str(f):
                  continue
              try:
                  ast.parse(f.read_text(encoding='utf-8'))
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors:
                  print(f'❌ {e}')
              sys.exit(1)
          print(f'✅ All Python files pass AST check')
          "

      - name: Unit Tests
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN || 'ci_dummy_token' }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY || 'ci_dummy_key' }}
        run: |
          python -m pytest tests/ -v --tb=short

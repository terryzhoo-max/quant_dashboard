# ============================================================
#  AlphaCore Nginx 反向代理配置
#  Batch 6: HTTPS + 安全头 + 静态资源缓存
#
#  部署方式: docker-compose 中 nginx 容器挂载此文件
#  HTTPS: Let's Encrypt 证书 (certbot 自动续期)
# ============================================================

# --- 上游服务定义 ---
upstream alphacore_app {
    server quant_dashboard:8000;
}

# --- HTTP → HTTPS 重定向 ---
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME 验证 (certbot 需要)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余全部 301 重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS 主配置 ---
server {
    listen 443 ssl http2;
    server_name _;

    # ── SSL 证书路径 (Let's Encrypt) ──
    # 首次部署时使用自签证书, certbot 成功后自动替换
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # ── SSL 安全配置 (Mozilla Intermediate) ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── 安全响应头 ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── 请求体大小限制 (防止大文件上传攻击) ──
    client_max_body_size 10M;

    # ── 静态资源: 直接由 Nginx 提供 (绕过 FastAPI) ──
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|map)$ {
        proxy_pass http://alphacore_app;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API 代理 ──
    location /api/ {
        proxy_pass http://alphacore_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置 (量化计算可能耗时较长)
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # ── 健康检查 (免认证) ──
    location /health {
        proxy_pass http://alphacore_app;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── 其余请求代理 (HTML 页面等) ──
    location / {
        proxy_pass http://alphacore_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 阻止敏感文件访问 ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(py|pyc|env|git|yml|yaml|sh|bat|json)$ {
        # 仅允许通过 API 路径访问 JSON
        # 直接访问 .py/.env/.git 等文件 → 403
        if ($uri !~ ^/api/) {
            return 403;
        }
        proxy_pass http://alphacore_app;
    }
}
